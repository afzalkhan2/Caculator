<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <style>
        body {
            background: linear-gradient(135deg, #141e30, #243b55);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 400px;
            background: #000000;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
        }

        .display {
            height: 70px;
            font-size: 30px;
            text-align: right;
            background: #222;
            color: #fff;
            border: none;
        }

        .display:focus {
            background: #222;
            color: #fff;
            box-shadow: none;
        }

        .btn {
            height: 60px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
        }

        .btn-light {
            background: #f8f9fa;
        }

        .btn-primary {
            background: #ff9500;
            border: none;
        }

        .btn-success {
            background: #28a745;
            border: none;
        }

        .btn-danger {
            background: #dc3545;
            border: none;
        }

        .btn-warning {
            color: #fff;
        }

        .btn-secondary {
            background: #444;
            border: none;
            color: #fff;
        }

        .btn:hover {
            transform: scale(1.05);
            transition: 0.2s;
        }
    </style>
</head>

<body>
    <div class="container mt-4">
        <h1 class="text-center text-white mb-3">Calculator</h1>

        <input type="text" class="form-control mb-3 display" readonly id="number" />

        <div class="row g-2">
            <div class="col-3">
                <button class="btn btn-danger w-100" onclick="clearAll()">AC</button>
            </div>
            <div class="col-3">
                <button class="btn btn-warning w-100" onclick="backSpace()">DEL</button>
            </div>
            <div class="col-3">
                <button class="btn btn-secondary w-100" onclick="Percentage()">%</button>
            </div>
            <div class="col-3">
                <button class="btn btn-primary w-100" onclick="SetNum('/')">/</button>
            </div>

            <div class="col-3"><button class="btn btn-light w-100" onclick="SetNum(7)">7</button></div>
            <div class="col-3"><button class="btn btn-light w-100" onclick="SetNum(8)">8</button></div>
            <div class="col-3"><button class="btn btn-light w-100" onclick="SetNum(9)">9</button></div>
            <div class="col-3">
                <button class="btn btn-primary w-100" onclick="SetNum('*')">*</button>
            </div>

            <div class="col-3"><button class="btn btn-light w-100" onclick="SetNum(4)">4</button></div>
            <div class="col-3"><button class="btn btn-light w-100" onclick="SetNum(5)">5</button></div>
            <div class="col-3"><button class="btn btn-light w-100" onclick="SetNum(6)">6</button></div>
            <div class="col-3">
                <button class="btn btn-primary w-100" onclick="SetNum('-')">-</button>
            </div>

            <div class="col-3"><button class="btn btn-light w-100" onclick="SetNum(1)">1</button></div>
            <div class="col-3"><button class="btn btn-light w-100" onclick="SetNum(2)">2</button></div>
            <div class="col-3"><button class="btn btn-light w-100" onclick="SetNum(3)">3</button></div>
            <div class="col-3">
                <button class="btn btn-primary w-100" onclick="SetNum('+')">+</button>
            </div>

            <div class="col-3">
                <button class="btn btn-secondary w-100" onclick="Squre()">x²</button>
            </div>
            <div class="col-3">
                <button class="btn btn-secondary w-100" onclick="SqureRoot()">√</button>
            </div>
            <div class="col-3"><button class="btn btn-light w-100" onclick="SetNum(0)">0</button></div>
            <div class="col-3">
                <button class="btn btn-success w-100" onclick="equalResult()">=</button>
            </div>

            <div class="col-6">
                <button class="btn btn-secondary w-100" onclick="SetNum('.')">.</button>
            </div>
            <div class="col-6">
                <button class="btn btn-secondary w-100" onclick="addMinusAdd()">±</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>

</html>
